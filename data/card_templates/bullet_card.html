<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      margin: 0;
      width: 1080px;
      height: 1920px;
      background: #fcf8f0;
      color: #1c2430;
      font-family: sans-serif;
      padding: 110px 80px;
      box-sizing: border-box;

    h1 { font-size: 72px; margin: 0 0 48px; }

</head>
<body>
  <h1>{{ title }}</h1>
  <div class="body">{{ body }}</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      margin: 0;
      width: 1080px;
      height: 1920px;
      box-sizing: border-box;
      background:
        radial-gradient(circle at 15% 20%, rgba(110, 86, 54, 0.12), transparent 18%),
        radial-gradient(circle at 82% 78%, rgba(90, 72, 48, 0.09), transparent 22%),
        linear-gradient(180deg, #f1e5c9, #e7d6b0);
      color: #4b3827;
      font-family: Georgia, "Times New Roman", serif;
      padding: 120px 86px;
      position: relative;
      overflow: hidden;
    }
    .frame {
      position: absolute;
      inset: 34px;
      border: 2px solid rgba(92, 67, 38, 0.45);
      box-shadow: inset 0 0 0 8px rgba(139, 107, 66, 0.08);
    }
    .eyebrow {
      font-size: 24px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 28px;
      color: #7b5d38;
    }
    h1 {
      margin: 0 0 30px;
      font-size: 84px;
      line-height: 1.08;
      max-width: 820px;
    }
    p {
      font-size: 38px;
      line-height: 1.5;
      max-width: 760px;
    }
    .keywords {
      margin-top: 68px;
      font-size: 26px;
      color: #8f6b43;
    }
  </style>
</head>
<body>
  <div class="frame"></div>
  <div class="eyebrow">Atlas Essay</div>
  <h1>{{ title }}</h1>
  <p>{{ body }}</p>
  <div class="keywords">{{ keywords }}</div>
</body>
</html>

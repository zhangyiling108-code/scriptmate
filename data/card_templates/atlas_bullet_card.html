<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      margin: 0;
      width: 1080px;
      height: 1920px;
      box-sizing: border-box;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.12), transparent 20%),
        linear-gradient(180deg, #efe2c1, #e3d0a6);
      color: #4f3a26;
      font-family: Georgia, "Times New Roman", serif;
      padding: 120px 90px;
      position: relative;
    }
    .frame {
      position: absolute;
      inset: 28px;
      border: 1.5px solid rgba(92, 67, 38, 0.55);
    }
    h1 {
      margin: 0 0 44px;
      font-size: 72px;
      line-height: 1.1;
      max-width: 820px;
    }
    .body {
      font-size: 48px;
      line-height: 1.55;
      max-width: 780px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="frame"></div>
  <h1>{{ title }}</h1>
  <div class="body">{{ body }}</div>
</body>
</html>

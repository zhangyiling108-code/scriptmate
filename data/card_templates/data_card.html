<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      margin: 0;
      width: 1080px;
      height: 1920px;
      background: linear-gradient(180deg, #eef4fb, #f7f1e3);
      color: #1c2b38;
      font-family: sans-serif;
      padding: 100px 80px;
      box-sizing: border-box;
    }
    h1 { font-size: 78px; margin: 0 0 42px; }
    p { font-size: 42px; line-height: 1.45; }
    .badge {
      display: inline-block;
      margin-top: 64px;
      padding: 16px 24px;
      border-radius: 999px;
      background: #1c2b38;
      color: #f7f1e3;
      font-size: 24px;
    }
  </style>
</head>
<body>
  <h1>{{ title }}</h1>
  <p>{{ body }}</p>
  <div class="badge">{{ visual_brief }}</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      margin: 0;
      width: 1080px;
      height: 1920px;
      box-sizing: border-box;
      background:
        radial-gradient(circle at 20% 18%, rgba(116, 87, 47, 0.11), transparent 18%),
        radial-gradient(circle at 82% 72%, rgba(72, 101, 103, 0.08), transparent 20%),
        linear-gradient(180deg, #efe4c7, #dfc99f);
      color: #493728;
      font-family: Georgia, "Times New Roman", serif;
      padding: 110px 86px;
      position: relative;
      overflow: hidden;
    }
    .frame {
      position: absolute;
      inset: 30px;
      border: 2px solid rgba(92, 67, 38, 0.42);
      box-shadow: inset 0 0 0 10px rgba(133, 101, 59, 0.06);
    }
    .caption {
      display: inline-block;
      padding: 10px 18px;
      border: 1px solid rgba(88, 63, 34, 0.55);
      font-size: 22px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #745631;
      margin-bottom: 26px;
      background: rgba(255,255,255,0.15);
    }
    h1 {
      margin: 0 0 30px;
      font-size: 76px;
      line-height: 1.08;
      max-width: 820px;
    }
    p {
      font-size: 40px;
      line-height: 1.48;
      max-width: 790px;
      margin: 0 0 48px;
    }
    .badge {
      display: inline-block;
      max-width: 820px;
      padding: 16px 22px;
      border: 1px solid rgba(88, 63, 34, 0.45);
      background: rgba(255, 250, 236, 0.45);
      font-size: 24px;
      line-height: 1.45;
      color: #6f553a;
    }
  </style>
</head>
<body>
  <div class="frame"></div>
  <div class="caption">Field Notes</div>
  <h1>{{ title }}</h1>
  <p>{{ body }}</p>
  <div class="badge">{{ visual_brief }}</div>
</body>
</html>

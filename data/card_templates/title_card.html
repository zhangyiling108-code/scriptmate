<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      margin: 0;
      width: 1080px;
      height: 1920px;
      background: linear-gradient(160deg, #f5efe4, #d7e3f1);
      color: #1b2733;
      font-family: sans-serif;
      padding: 96px 72px;
      box-sizing: border-box;
    }
    h1 { font-size: 88px; margin: 0 0 32px; }
    p { font-size: 42px; line-height: 1.4; }
    .keywords { margin-top: 72px; font-size: 28px; color: #6e614f; }
  </style>
</head>
<body>
  <h1>{{ title }}</h1>
  <p>{{ body }}</p>
  <div class="keywords">{{ keywords }}</div>
</body>
</html>

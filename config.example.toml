[matching]
top_results = 3
search_pool_size = 8
min_score = 0.55
strong_score = 0.70
video_min_resolution = 1080
video_orientation = "vertical"

[generation]
charts = true
ai_images = false
chart_style = "dark_professional"

[library]
root = ""
metadata = ""

[cards]
width = 1080
height = 1920
theme = "atlas"

[output]
format = "both"
download_quality = "hd"
cache_dir = ""

[[sources.extra]]
name = "pond5"
enabled = false
kind = "manual"
license = "paid"
priority = 20
home_url = "https://www.pond5.com/"
search_url_template = "https://www.pond5.com/search?kw={query}"
api_key = ""
api_key_env = "POND5_API_KEY"
base_url = ""

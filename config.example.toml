max_retries = 1

[judge_model]
provider = "openai"
model = "gpt-4o-mini"
api_key = ""
base_url = "https://api.openai.com/v1"
timeout_seconds = 30
max_retries = 1

[sources]
enabled = ["pexels", "pixabay"]

[sources.pexels]
api_key = ""
base_url = ""

[sources.pixabay]
api_key = ""
base_url = ""

[[sources.extra]]
name = "vjshi"
enabled = false
kind = "manual"
license = "freemium"
priority = 15
home_url = "https://www.vjshi.com/"
search_url_template = "https://www.vjshi.com/search?wd={query}"
api_key = ""
api_key_env = "VJSHI_API_KEY"
base_url = ""
notes = "Chinese footage marketplace / freemium search source."

[[sources.extra]]
name = "shipin520"
enabled = false
kind = "manual"
license = "freemium"
priority = 18
home_url = "https://shipin520.com/"
search_url_template = "https://shipin520.com/video/search/{query}.html"
api_key = ""
api_key_env = "SHIPIN520_API_KEY"
base_url = ""
